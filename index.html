<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF 工具箱</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">

      <!-- ===== 合併區塊（原本） ===== -->
      <h1>PDF 合併工具</h1>
      <p class="subtitle">上傳多個 PDF，調整順序後一鍵下載合併檔案。</p>

      <section class="card">
        <label for="pdfInput" class="button">選擇 PDF 檔案</label>
        <input id="pdfInput" type="file" accept="application/pdf" multiple />
        <div id="dropZone" class="drop-zone" role="button" tabindex="0">
          把 PDF 拖曳到這裡，或點上方按鈕選擇
        </div>
        <p id="hint">可一次選擇多個檔案，或再次選擇以追加。</p>
      </section>

      <section class="card">
        <h2>檔案清單（含頁數預覽）</h2>
        <ul id="fileList" aria-live="polite"></ul>
      </section>

      <section class="actions">
        <button id="mergeBtn" disabled>合併並下載</button>
        <button id="clearBtn" class="secondary" disabled>清空清單</button>
      </section>

      <p id="status" aria-live="polite"></p>

      <!-- ===== 分隔線 ===== -->
      <hr class="section-divider" />

      <!-- ===== 分割區塊（新增） ===== -->
      <h1>PDF 分割工具</h1>
      <p class="subtitle">上傳一個 PDF，指定頁範圍，各自存成獨立 PDF 並打包下載。</p>

      <section class="card">
        <label for="splitInput" class="button">選擇要分割的 PDF</label>
        <input id="splitInput" type="file" accept="application/pdf" />
        <p id="splitFileInfo" class="split-file-info"></p>
      </section>

      <section class="card" id="splitRangeCard" style="display:none">
        <h2>設定分割範圍</h2>
        <p class="split-hint">
          每個片段用逗號分隔，例如：<code>1-3, 4-6, 7</code><br />
          每個範圍各輸出一個 PDF，頁碼從 1 開始。
        </p>
        <div class="split-input-row">
          <input id="splitRangeInput" type="text" placeholder="例：1-3, 4-6, 7-10" />
          <button id="splitBtn">分割並下載 ZIP</button>
        </div>
        <p id="splitStatus" aria-live="polite"></p>
      </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
